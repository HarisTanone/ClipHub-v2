[pytest]
testpaths = tests
python_files = test_*.py
# These are standalone production/live API scripts. They execute network calls,
# use fixed credentials, and mutate server state during module import, so they
# must never be collected by the deterministic pre-deployment unit-test gate.
addopts = --strict-markers
  --ignore=tests/test_api_comprehensive.py
  --ignore=tests/test_api_live_premium.py
  --ignore=tests/test_groq_llm_flow.py
  --ignore=tests/test_live_v2_pipeline.py
  --ignore=tests/test_qa_all_flows.py
  --ignore=tests/test_render_visual.py
  --ignore=tests/test_superadmin_toggle.py
  --ignore=tests/test_v1_pipeline_intact.py